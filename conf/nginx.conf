location / {

  # Reverse-proxy to the Materialious node backend (adapter-node).
  proxy_pass http://127.0.0.1:__PORT__;
  proxy_http_version 1.1;

  # Pass the real host / client info so adapter-node's ORIGIN check and the app work.
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;

  # Streaming / large-proxy friendly: never buffer, no body size cap, long timeouts.
  # (Server-Sent Events used by the app rely on proxy_buffering being off.)
  proxy_buffering         off;
  proxy_request_buffering off;
  client_max_body_size    0;
  proxy_connect_timeout   3600s;
  proxy_send_timeout      3600s;
  proxy_read_timeout      3600s;
  send_timeout            3600s;

  # Include SSOwat (required by YunoHost so permissions apply).
  include conf.d/yunohost_panel.conf.inc;
}
